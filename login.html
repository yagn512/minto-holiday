<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Minto Holidays</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:48px;margin-bottom:8px">🔐</div>
      <h2>Admin Panel</h2>
      <p>Minto Holidays – Owner Access Only</p>
    </div>
    <input type="text" id="uname" placeholder="Username" autocomplete="off">
    <input type="password" id="upass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div class="login-err" id="lerr">❌ Wrong username or password</div>
    <div style="text-align:center;margin-top:18px">
      <a href="../index.html" style="color:#888;font-size:13px"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>
</div>
<script>
// Default credentials — change in server.py
const ADMIN_USER = 'minto';
const ADMIN_PASS = 'minto2025';

function doLogin(){
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    sessionStorage.setItem('minto_admin','yes');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('upass').value = '';
  }
}
</script>
</body>
</html>
