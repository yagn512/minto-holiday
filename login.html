
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Minto Holidays</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    min-height:100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Sans',sans-serif;
    overflow:hidden;
  }

  /* floating bubbles */
  .bubble{position:fixed;border-radius:50%;opacity:.08;animation:float linear infinite;}
  .bubble:nth-child(1){width:300px;height:300px;background:#e91e63;top:-80px;left:-80px;animation-duration:20s;}
  .bubble:nth-child(2){width:200px;height:200px;background:#ff9800;bottom:10%;right:5%;animation-duration:15s;}
  .bubble:nth-child(3){width:150px;height:150px;background:#00bcd4;top:40%;left:5%;animation-duration:18s;}
  @keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

  .login-wrap{
    position:relative;z-index:10;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:48px 44px;
    width:100%;max-width:420px;
    box-shadow:0 32px 80px rgba(0,0,0,.4);
    animation:slideUp .6s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

  .logo-icon{
    width:72px;height:72px;border-radius:20px;
    background:linear-gradient(135deg,#e91e63,#ff5722);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;margin:0 auto 20px;
    box-shadow:0 8px 24px rgba(233,30,99,.4);
  }

  h1{
    font-family:'Playfair Display',serif;
    color:#fff;font-size:26px;text-align:center;margin-bottom:6px;
  }
  .sub{color:rgba(255,255,255,.5);text-align:center;font-size:13px;margin-bottom:32px;}

  .field{margin-bottom:16px;position:relative;}
  .field i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:14px;}
  .field input{
    width:100%;padding:14px 16px 14px 44px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px;color:#fff;font-size:14px;
    font-family:'DM Sans',sans-serif;
    transition:all .2s;outline:none;
  }
  .field input::placeholder{color:rgba(255,255,255,.35);}
  .field input:focus{border-color:rgba(233,30,99,.6);background:rgba(255,255,255,.12);}

  .btn-login{
    width:100%;padding:15px;margin-top:8px;
    background:linear-gradient(135deg,#e91e63,#ff5722);
    border:none;border-radius:12px;color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;
    font-family:'DM Sans',sans-serif;
    box-shadow:0 8px 24px rgba(233,30,99,.35);
    transition:all .2s;letter-spacing:.3px;
  }
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(233,30,99,.5);}
  .btn-login:active{transform:translateY(0);}

  .err{
    background:rgba(244,67,54,.15);border:1px solid rgba(244,67,54,.3);
    color:#ff6b6b;border-radius:10px;padding:10px 14px;
    font-size:13px;text-align:center;margin-top:12px;
    display:none;
  }

  .back{display:block;text-align:center;margin-top:20px;color:rgba(255,255,255,.4);font-size:13px;text-decoration:none;transition:.2s;}
  .back:hover{color:rgba(255,255,255,.7);}
</style>
</head>
<body>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="login-wrap">
  <div class="logo-icon">✈️</div>
  <h1>Minto Holidays</h1>
  <p class="sub">Admin Dashboard • Owner Access Only</p>

  <div class="field">
    <i class="fas fa-user"></i>
    <input type="text" id="uname" placeholder="Username" autocomplete="off">
  </div>
  <div class="field">
    <i class="fas fa-lock"></i>
    <input type="password" id="upass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>

  <button class="btn-login" onclick="doLogin()">
    <i class="fas fa-sign-in-alt"></i> &nbsp;Login to Dashboard
  </button>

  <div class="err" id="lerr">❌ Wrong username or password. Try again.</div>

  <a href="index.html" class="back"><i class="fas fa-arrow-left"></i> Back to Website</a>
</div>

<script>
const ADMIN_USER = 'minto';
const ADMIN_PASS = 'minto2025';

function doLogin(){
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS){
    sessionStorage.setItem('minto_admin','yes');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('upass').value = '';
  }
}
</script>
</body>
</html>
